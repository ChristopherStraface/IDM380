<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact cs3878</title>
    <link rel="stylesheet" href="accessible.css">
    <script src="script.js" defer></script>
     <link rel="icon" href="media/Selfie.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <!-- Skip link for keyboard users -->
    <a class="skip-link" href="#contact-heading">Skip Navigation</a>
    
    <!-- Navigation Menu -->
    <nav class="topnavcontainer" aria-label="Main navigation">
        <ul class="topnav" id="mainNav" role="menubar" aria-label="Main navigation">
            <li role="none"><a href="home.html" role="menuitem">Home</a></li>
            <li role="none"><a href="about.html" role="menuitem">About</a></li>
            <li role="none"><a href="contact.html" role="menuitem">Contact</a></li>
        </ul>
        <div class="dropdown">
            <button class="dropdown-toggle" aria-label="Settings menu" aria-expanded="false">⚙️</button>
            <div class="dropdown-menu" aria-hidden="true">
                <div class="toggle-container">
                    <label class="switch" aria-label="Toggle dark mode">
                        <input type="checkbox" id="darkModeToggle" aria-label="Dark mode toggle">
                        <span class="slider" aria-hidden="true"></span>
                    </label>
                    <span class="toggle-label">Dark Mode Toggle</span>
                </div>
                <button id="dyslexiaToggle" class="dyslexia-button" aria-pressed="false">Dyslexia-Friendly Mode</button>
            </div>
        </div>
        <button class="nav-hamburger" id="navHamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mainNav">&#9776;</button>
    </nav>

    <main>
      <section id="contact" aria-labelledby="contact-heading">
        <h2 id="contact-heading">Contact Us</h2>
        <form id="contactForm" novalidate>
          <div class="field">
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" name="firstName" required aria-required="true" aria-describedby="firstNameError firstNameSuccess" aria-invalid="false">
            <span id="firstNameError" class="error" role="alert" aria-live="assertive"></span>
            <span id="firstNameSuccess" class="success" aria-live="polite"></span>
          </div>
          <div class="field">
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" name="lastName" required aria-required="true" aria-describedby="lastNameError lastNameSuccess" aria-invalid="false">
            <span id="lastNameError" class="error" role="alert" aria-live="assertive"></span>
            <span id="lastNameSuccess" class="success" aria-live="polite"></span>
          </div>
          <div class="field">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required aria-required="true" aria-describedby="emailError emailSuccess" aria-invalid="false">
            <span id="emailError" class="error" role="alert" aria-live="assertive"></span>
            <span id="emailSuccess" class="success" aria-live="polite"></span>
          </div>
          <div class="field">
            <fieldset class="date-fieldset" aria-describedby="appointmentDateError appointmentDateSuccess">
              <legend>Preferred Date <span class="field-optional">(optional)</span></legend>
              <div class="date-selects">
                <div class="date-select-group">
                  <label for="dateMonth">Month</label>
                  <select id="dateMonth" name="dateMonth" aria-invalid="false">
                    <option value="">-- Month --</option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                  </select>
                </div>
                <div class="date-select-group">
                  <label for="dateDay">Day</label>
                  <select id="dateDay" name="dateDay" aria-invalid="false">
                    <option value="">-- Day --</option>
                  </select>
                </div>
                <div class="date-select-group">
                  <label for="dateYear">Year</label>
                  <select id="dateYear" name="dateYear" aria-invalid="false">
                    <option value="">-- Year --</option>
                  </select>
                </div>
              </div>
            </fieldset>
            <span id="appointmentDateError" class="error" role="alert" aria-live="assertive"></span>
            <span id="appointmentDateSuccess" class="success" aria-live="polite"></span>
          </div>
          <div class="field">
            <label for="comment">Leave a comment <span class="field-optional">(optional)</span></label>
            <textarea id="comment" name="comment" rows="4" aria-describedby="commentError commentSuccess" aria-invalid="false"></textarea>
            <span id="commentError" class="error" role="alert" aria-live="assertive"></span>
            <span id="commentSuccess" class="success" aria-live="polite"></span>
          </div>
          <button type="submit">Submit</button>
        </form>
      </section>
    </main>

    

  <script>
        function toggleDarkMode(isEnabled) {
            document.body.classList.toggle('dark-mode', isEnabled);
            localStorage.setItem('darkMode', isEnabled ? 'on' : 'off');
        }

        function applyDarkModePreference() {
            const saved = localStorage.getItem('darkMode');
            let darkMode;
            if (saved !== null) {
                darkMode = saved === 'on';
            } else {
                darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            document.body.classList.toggle('dark-mode', darkMode);
            document.getElementById('darkModeToggle').checked = darkMode;
        }

        function toggleDyslexiaMode(isEnabled) {
            document.body.classList.toggle('dyslexia-mode', isEnabled);
            localStorage.setItem('dyslexiaMode', isEnabled ? 'on' : 'off');
            const dyslexiaButton = document.getElementById('dyslexiaToggle');
            if (dyslexiaButton) dyslexiaButton.setAttribute('aria-pressed', isEnabled ? 'true' : 'false');
        }

        function applyDyslexiaModePreference() {
            const dyslexiaMode = localStorage.getItem('dyslexiaMode') === 'on';
            document.body.classList.toggle('dyslexia-mode', dyslexiaMode);
            const dyslexiaButton = document.getElementById('dyslexiaToggle');
            if (dyslexiaButton) {
                dyslexiaButton.setAttribute('aria-pressed', dyslexiaMode ? 'true' : 'false');
                dyslexiaButton.classList.toggle('active', dyslexiaMode);
            }
        }

        // Takes a string ID, not an input element
        function displayError(id, message) {
            const errorElem = document.getElementById(id + 'Error');
            const successElem = document.getElementById(id + 'Success');
            if (errorElem) errorElem.innerHTML = message ? '<i class="fa fa-times-circle" aria-hidden="true"></i> ' + message : '';
            if (successElem) successElem.innerHTML = '';
        }

        function displaySuccess(id, message) {
            const errorElem = document.getElementById(id + 'Error');
            const successElem = document.getElementById(id + 'Success');
            if (errorElem) errorElem.innerHTML = '';
            if (successElem) successElem.innerHTML = '<i class="fa fa-check-circle" aria-hidden="true"></i> ' + message;
        }

        function validateField(input) {
            if (input.hasAttribute('required') && !input.value.trim()) {
                displayError(input.id, 'This field is required.');
                input.setAttribute('aria-invalid', 'true');
                return false;
            }
            if (input.type === 'email' && input.value.trim() && !input.checkValidity()) {
                displayError(input.id, 'Please enter a valid email address.');
                input.setAttribute('aria-invalid', 'true');
                return false;
            }
            // Valid — clear any previous error silently
            displayError(input.id, '');
            input.setAttribute('aria-invalid', 'false');
            return true;
        }

        function validateDateSelects() {
            const month = document.getElementById('dateMonth').value;
            const day = document.getElementById('dateDay').value;
            const year = document.getElementById('dateYear').value;
            const anyFilled = month || day || year;
            const allFilled = month && day && year;

            ['dateMonth', 'dateDay', 'dateYear'].forEach(function(id) {
                document.getElementById(id).setAttribute('aria-invalid', 'false');
            });

            if (anyFilled && !allFilled) {
                displayError('appointmentDate', 'Please complete all three date fields (month, day, and year).');
                ['dateMonth', 'dateDay', 'dateYear'].forEach(function(id) {
                    if (!document.getElementById(id).value) {
                        document.getElementById(id).setAttribute('aria-invalid', 'true');
                    }
                });
                return false;
            }

            if (allFilled) {
                const selected = new Date(year, month - 1, day);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                if (selected < today) {
                    displayError('appointmentDate', 'Please select today or a future date.');
                    ['dateMonth', 'dateDay', 'dateYear'].forEach(function(id) {
                        document.getElementById(id).setAttribute('aria-invalid', 'true');
                    });
                    return false;
                }
                // Valid — clear any previous error silently
                displayError('appointmentDate', '');
            } else {
                displayError('appointmentDate', '');
            }

            return true;
        }

        function populateDays() {
            const monthSelect = document.getElementById('dateMonth');
            const daySelect = document.getElementById('dateDay');
            const yearSelect = document.getElementById('dateYear');
            const month = parseInt(monthSelect.value);
            const year = parseInt(yearSelect.value);
            const currentDay = daySelect.value;

            const daysInMonth = (month && year)
                ? new Date(year, month, 0).getDate()
                : (month ? new Date(2000, month, 0).getDate() : 31);

            daySelect.innerHTML = '<option value="">-- Day --</option>';
            for (var d = 1; d <= daysInMonth; d++) {
                var opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d;
                daySelect.appendChild(opt);
            }
            if (currentDay && parseInt(currentDay) <= daysInMonth) {
                daySelect.value = currentDay;
            }
        }

        function populateYears() {
            var yearSelect = document.getElementById('dateYear');
            var thisYear = new Date().getFullYear();
            for (var y = thisYear; y <= thisYear + 5; y++) {
                var opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                yearSelect.appendChild(opt);
            }
        }

        function validateForm(e) {
            e.preventDefault();
            var form = e.target;
            // Only pass actual input/textarea fields — date selects handled separately
            var fields = [form.firstName, form.lastName, form.email, form.comment];
            var valid = fields.map(validateField).every(Boolean);
            valid = validateDateSelects() && valid;

            if (valid) {
                alert('Thank you! Your message has been sent.');
                form.reset();
                populateDays();
                form.querySelectorAll('.error, .success').forEach(function(el) { el.innerHTML = ''; });
                form.querySelectorAll('input, textarea, select').forEach(function(el) { el.setAttribute('aria-invalid', 'false'); });
            } else {
                var firstInvalid = form.querySelector('[aria-invalid="true"]');
                if (firstInvalid) firstInvalid.focus();
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            applyDarkModePreference();
            applyDyslexiaModePreference();

            // Hamburger menu
            const hamburger = document.getElementById('navHamburger');
            const mainNav = document.getElementById('mainNav');
            if (hamburger && mainNav) {
                hamburger.addEventListener('click', function () {
                    const isOpen = mainNav.classList.contains('open');
                    mainNav.classList.toggle('open', !isOpen);
                    hamburger.setAttribute('aria-expanded', String(!isOpen));
                    hamburger.textContent = isOpen ? '\u2630' : '\u2715';
                    hamburger.setAttribute('aria-label', isOpen ? 'Open navigation menu' : 'Close navigation menu');
                });
            }

            populateYears();
            populateDays();

            document.getElementById('dateMonth').addEventListener('change', populateDays);
            document.getElementById('dateYear').addEventListener('change', populateDays);

            var darkToggle = document.getElementById('darkModeToggle');
            if (darkToggle) {
                darkToggle.addEventListener('change', function (e) {
                    toggleDarkMode(e.target.checked);
                });
                darkToggle.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        darkToggle.checked = !darkToggle.checked;
                        toggleDarkMode(darkToggle.checked);
                    }
                });
            }

            var dyslexiaToggle = document.getElementById('dyslexiaToggle');
            if (dyslexiaToggle) {
                dyslexiaToggle.addEventListener('click', function () {
                    var isEnabled = !document.body.classList.contains('dyslexia-mode');
                    toggleDyslexiaMode(isEnabled);
                    dyslexiaToggle.classList.toggle('active', isEnabled);
                });
            }

            var dropdownToggle = document.querySelector('.dropdown-toggle');
            var dropdownMenu = document.querySelector('.dropdown-menu');
            if (dropdownToggle && dropdownMenu) {
                dropdownToggle.addEventListener('click', function () {
                    var isOpen = dropdownMenu.classList.contains('open');
                    dropdownMenu.classList.toggle('open', !isOpen);
                    dropdownToggle.setAttribute('aria-expanded', !isOpen);
                    dropdownMenu.setAttribute('aria-hidden', isOpen);
                });
                // Close dropdown when clicking outside
                document.addEventListener('click', function (e) {
                    if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
                        dropdownMenu.classList.remove('open');
                        dropdownToggle.setAttribute('aria-expanded', 'false');
                        dropdownMenu.setAttribute('aria-hidden', 'true');
                    }
                });
            }

            var contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' && e.target.tagName.toLowerCase() !== 'textarea' && e.target.id !== 'darkModeToggle') {
                        e.preventDefault();
                        e.stopPropagation();
                        var focusable = Array.from(contactForm.elements).filter(function(el) {
                            return el.tagName.toLowerCase() !== 'fieldset' && el.type !== 'submit' && !el.disabled;
                        });
                        var idx = focusable.indexOf(e.target);
                        if (idx > -1 && idx < focusable.length - 1) {
                            focusable[idx + 1].focus();
                        }
                    }
                });
                contactForm.addEventListener('submit', validateForm);
            }
        });
    </script>
</body>
</html>
